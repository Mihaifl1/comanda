<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Comenzi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

.header {
  background:#1e3a8a;
  color:white;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.container {
  padding:40px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap:30px;
  max-width:900px;
  margin:auto;
}

.card {
  background:white;
  padding:30px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-5px);
}

.icon {
  font-size:40px;
  margin-bottom:15px;
}

.logout {
  margin-top:40px;
  text-align:center;
}

.logout button {
  background:#dc2626;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:6px;
  cursor:pointer;
}

.logout button:hover {
  opacity:0.8;
}
</style>
</head>

<body onload="checkUser()">

<div class="header">
  📦 Sistem Comenzi
</div>

<div class="container">

  <div class="card" onclick="location.href='comanda.html'">
    <div class="icon">➕</div>
    <h3>Comandă Nouă</h3>
    <p>Adaugă o comandă nouă</p>
  </div>

  <div class="card" onclick="location.href='list.html'">
    <div class="icon">📋</div>
    <h3>Lista Comenzi</h3>
    <p>Vezi toate comenzile</p>
  </div>

  <div class="card" onclick="location.href='status.html'">
    <div class="icon">📊</div>
    <h3>Status Comenzi</h3>
    <p>Vizualizare progres</p>
  </div>

</div>

<div class="logout">
  <button onclick="logout()">Logout</button>
</div>

<script src="app.js"></script>

<script>
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
