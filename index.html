<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sistem Comenzi</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; text-align:center; }
        .card {
            background:white;
            padding:20px;
            margin:20px auto;
            width:300px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background:#4CAF50;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h1>📦 Sistem Comenzi</h1>

<div class="card">
    <h3>Produs 1</h3>
    <p>Preț: 100 MDL</p>
    <button onclick="alert('Comandă trimisă!')">Comandă</button>
</div>

</body>
</html>
