<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Comenzi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
.box { background:white; padding:20px; margin:20px auto; width:400px; border-radius:10px; }
input { width:90%; padding:8px; margin:5px; }
button { padding:10px 20px; background:#4CAF50; color:white; border:none; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="loginBox" class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Parola"><br>
<button onclick="login()">Login</button>
</div>

<div id="appBox" class="box hidden">
<h2>Sistem Comenzi</h2>
<button onclick="logout()">Logout</button><br><br>

<input type="text" id="client" placeholder="Client"><br>
<input type="text" id="produs" placeholder="Produs"><br>
<input type="number" id="cantitate" placeholder="Cantitate"><br>
<input type="file" id="file"><br><br>
<button onclick="salveaza()">Salveaza Comanda</button>

<h3>Lista Comenzi</h3>
<div id="lista"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://kbbdsywnixtfmxrtwcus.supabase.co",
  "sb_publishable_yWSzqXZfgSSMPgTAntPdug_sCDHXl7B"
);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert("Login failed");
  else location.reload();
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();

  if (data.user) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    loadComenzi();
  }
}

async function salveaza() {

  const client = document.getElementById("client").value;
  const produs = document.getElementById("produs").value;
  const cantitate = document.getElementById("cantitate").value;
  const fileInput = document.getElementById("file");
  let fileUrl = null;

  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const fileName = Date.now() + "_" + file.name;

    const { error } = await supabaseClient.storage
      .from("comenzi")
      .upload(fileName, file);

    if (error) {
      alert("Eroare upload");
      return;
    }

    const { data } = supabaseClient.storage
      .from("comenzi")
      .getPublicUrl(fileName);

    fileUrl = data.publicUrl;
  }

  const { error } = await supabaseClient
    .from("comenzi")
    .insert([{ client, produs, cantitate, status: fileUrl }]);

  if (error) alert("Eroare salvare");
  else {
    alert("Salvat!");
    loadComenzi();
  }
}

async function loadComenzi() {
  const { data } = await supabaseClient
    .from("comenzi")
    .select("*")
    .order("id", { ascending: false });

  let html = "";
  data.forEach(c => {
    html += `
    <div style="border:1px solid #ccc; margin:5px; padding:5px;">
      <b>${c.client}</b> - ${c.produs} (${c.cantitate})
      <br>
      ${c.status ? `<a href="${c.status}" target="_blank">Fisier</a>` : ""}
    </div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

checkUser();
</script>
</body>
</html>
