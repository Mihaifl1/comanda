<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Comenzi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#f1f3f7;
}

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e3a8a;
  color:white;
  padding:15px 30px;
}

.logo {
  font-weight:bold;
  font-size:18px;
}

.back-btn {
  background:white;
  color:#1e3a8a;
  border:none;
  padding:8px 15px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.container {
  padding:30px 60px;
}

.filter-bar {
  margin-bottom:20px;
  display:flex;
  gap:15px;
}

input, select {
  padding:8px 10px;
  border-radius:6px;
  border:1px solid #ccc;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th {
  background:#2c3e90;
  color:white;
  padding:14px;
  text-align:left;
}

td {
  padding:14px;
  border-bottom:1px solid #eee;
}

tr:hover {
  background:#f8f9fc;
}

.status {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  color:white;
}

.status.Noua { background:#f39c12; }
.status.InProgress { background:#3498db; }
.status.Done { background:#2ecc71; }

.download-btn {
  background:#27ae60;
  color:white;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.download-btn:hover {
  opacity:0.85;
}
</style>
</head>

<body onload="checkUser(); loadOrders();">

<div class="topbar">
  <div class="logo">📦 Sistem Comenzi</div>
  <button class="back-btn" onclick="location.href='index.html'">⬅ Înapoi</button>
</div>

<div class="container">

<div class="filter-bar">
  <input type="text" id="search" placeholder="Caută client / produs" onkeyup="filterOrders()">
  <select id="statusFilter" onchange="filterOrders()">
    <option value="">Toate</option>
    <option value="Noua">Noua</option>
    <option value="In Progress">In Progress</option>
    <option value="Done">Done</option>
  </select>
</div>

<div id="lista"></div>

</div>

<script src="app.js"></script>

<script>

let allOrders = [];

async function loadOrders() {
  const { data } = await supabaseClient
    .from("comenzi")
    .select("*")
    .order("data_comanda", { ascending: false });

  allOrders = data;
  renderOrders(data);
}

function formatDate(dateString){
  if(!dateString) return "-";
  return new Date(dateString).toLocaleString("ro-RO");
}

function normalizeStatus(status){
  if(status === "In Progress") return "InProgress";
  return status || "Noua";
}

function renderOrders(data){

  let html = `
  <table>
    <tr>
      <th>Data</th>
      <th>Client</th>
      <th>Produs</th>
      <th>Cantitate</th>
      <th>Status</th>
      <th>Fișier</th>
    </tr>`;

  data.forEach(c => {

    html += `
      <tr>
        <td>${formatDate(c.data_comanda)}</td>
        <td>${c.client}</td>
        <td>${c.produs}</td>
        <td>${c.cantitate}</td>
        <td>
          <span class="status ${normalizeStatus(c.status)}">
            ${c.status || 'Noua'}
          </span>
        </td>
        <td>
          ${c.file_url 
            ? `<button class="download-btn" onclick="window.open('${c.file_url}','_blank')">Descarcă</button>` 
            : '-'}
        </td>
      </tr>`;
  });

  html += "</table>";

  document.getElementById("lista").innerHTML = html;
}

function filterOrders(){

  const search = document.getElementById("search").value.toLowerCase();
  const status = document.getElementById("statusFilter").value;

  let filtered = allOrders.filter(o => {

    const matchSearch =
      (o.client && o.client.toLowerCase().includes(search)) ||
      (o.produs && o.produs.toLowerCase().includes(search));

    const matchStatus =
      !status || o.status === status;

    return matchSearch && matchStatus;
  });

  renderOrders(filtered);
}

</script>

</body>
</html>
