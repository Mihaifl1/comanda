async function open3DViewer(fileUrl, productName) {
    if (!fileUrl) return alert("Nu există fișier!");
    if (typeof OV === "undefined") return alert("Vizualizatorul 3D se încarcă... Așteaptă.");
    if (!fileUrl) {
        alert("Nu există fișier atașat acestui produs!");
        return;
    }

    // Verificăm dacă librăria s-a încărcat
    if (typeof OV === "undefined") {
        alert("Se încarcă vizualizatorul 3D... Încearcă din nou în câteva secunde.");
        return;
    }

    const modalHTML = `
    <div id="viewerModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Vizualizare 3D: ${productName}</span>
                <button onclick="close3DViewer()">✕</button>
            </div>
            <div id="viewerContainer">
                <div class="loading">Se încarcă modelul 3D...<br><small>Așteaptă puțin...</small></div>
            </div>
        </div>
    </div>`;

    document.body.insertAdjacentHTML('beforeend', modalHTML);

    const container = document.getElementById("viewerContainer");

    // ... (păstrează codul pentru modal și OV.EmbeddedViewer din varianta anterioară)
    // Poți copia blocul din mesajul anterior dacă vrei.
    try {
        currentViewer = new OV.EmbeddedViewer(container, {
            backgroundColor: [245, 245, 250],
            edgeSettings: { showEdges: true }
        });

        const response = await fetch(fileUrl);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const blob = await response.blob();
        await currentViewer.LoadModelFromFile(blob, {
            fileName: fileUrl.split('/').pop() || "model.step"
        });

        currentViewer.FitToWindow();
    } catch (err) {
        console.error("Eroare 3D:", err);
        container.innerHTML = `
            <div style="padding:80px 40px; text-align:center; color:#c0392b;">
                <strong>Nu s-a putut încărca modelul 3D</strong><br><br>
                <small>Fișierul se descarcă, dar apare o problemă la vizualizare.</small><br><br>
                <button onclick="close3DViewer()" style="padding:10px 20px;background:#3498db;color:white;border:none;border-radius:6px;cursor:pointer;">Închide</button>
            </div>`;
    }
}

function close3DViewer() {
const modal = document.getElementById("viewerModal");
if (modal) modal.remove();

}
