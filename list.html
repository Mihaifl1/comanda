<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Comenzi</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/online-3d-viewer@latest/build/3dviewer.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/online-3d-viewer@latest/build/3dviewer.css">

<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:#f1f3f7;}
.topbar{display:flex;justify-content:space-between;align-items:center;background:#1e3a8a;color:white;padding:15px 30px;}
.logo{font-weight:bold;font-size:18px;}
.back-btn{background:white;color:#1e3a8a;border:none;padding:8px 15px;border-radius:6px;cursor:pointer;font-weight:600;}
.container{padding:30px 60px;}
.filter-bar{margin-bottom:20px;display:flex;gap:15px;}
input,select,textarea{padding:8px 10px;border-radius:6px;border:1px solid #ccc;}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
th{background:#2c3e90;color:white;padding:14px;text-align:left;}
td{padding:14px;border-bottom:1px solid #eee;}
tr:hover{background:#f8f9fc;}
.status{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;color:white;}
.status.Noua{background:#f39c12;}
.status.InProgress{background:#3498db;}
.status.Done{background:#2ecc71;}
.save-btn{background:#27ae60;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
.download-btn{background:#3498db;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
.product-cell{cursor:pointer;color:#1e40af;font-weight:500;}
.product-cell:hover{text-decoration:underline;}
#viewerModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:10000;display:flex;align-items:center;justify-content:center;}
#viewerModal .modal-content{background:white;width:96%;max-width:1350px;height:94%;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;}
#viewerModal .modal-header{padding:12px 20px;background:#1e3a8a;color:white;display:flex;justify-content:space-between;align-items:center;font-weight:600;}
#viewerModal .modal-header button{background:none;border:none;color:white;font-size:26px;cursor:pointer;}
#viewerContainer{flex:1;background:#f0f2f7;position:relative;}
.loading, .no-data, .error-msg{padding:80px;text-align:center;font-size:18px;}
</style>
</head>
<body>
<div class="topbar">
    <div class="logo">📦 Sistem Comenzi</div>
    <button class="back-btn" onclick="location.href='index.html'">⬅ Înapoi</button>
</div>
<div class="container">
    <div class="filter-bar">
        <input type="text" id="search" placeholder="Caută client / produs" onkeyup="filterOrders()">
        <select id="statusFilter" onchange="filterOrders()">
            <option value="">Toate</option>
            <option value="Noua">Noua</option>
            <option value="InProgress">InProgress</option>
            <option value="Done">Done</option>
        </select>
    </div>
    <div id="lista"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
    "https://kbbdsywnixtfmxrtwcus.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiYmRzeXduaXh0Zm14cnR3Y3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQ5MTksImV4cCI6MjA4ODEyMDkxOX0.Uz4xGhxiZkcwVIrNnFwoWpiwnLW2L8HCXGd4toNv3Hc"
);

let allOrders = [];

async function loadOrders() {
    const listaDiv = document.getElementById("lista");
    listaDiv.innerHTML = `<div class="loading">Se încarcă comenzile din Supabase...</div>`;

    try {
        // Schimbă "comenzi" dacă tabela ta are alt nume (ex: "orders", "comanda")
        const { data, error } = await supabaseClient
            .from("comenzi")
            .select("*")
            .order("data_comanda", { ascending: false });

        console.log("Supabase response:", { data, error });   // vezi în consolă

        if (error) throw error;

        allOrders = data || [];

        if (allOrders.length === 0) {
            listaDiv.innerHTML = `<div class="no-data">Nu există comenzi în tabel.<br>Verifică dacă ai date în Supabase.</div>`;
        } else {
            renderOrders(allOrders);
        }
    } catch (err) {
        console.error("Eroare completă:", err);
        listaDiv.innerHTML = `
            <div class="error-msg" style="color:red;">
                <strong>Nu s-au putut încărca datele</strong><br><br>
                Mesaj: ${err.message}<br><br>
                <small>Posibile cauze:<br>
                • Tabela nu se numește "comenzi"<br>
                • RLS este activat și blochează anon key<br>
                • Nu există date în tabel</small>
            </div>`;
    }
}

function renderOrders(data) {
    let html = `<table>
        <tr>
            <th>Data</th><th>Client</th><th>Produs</th><th>Cantitate</th>
            <th>Status</th><th>Pret</th><th>Coment</th><th>Fisier</th><th>Salveaza</th>
        </tr>`;

    data.forEach(c => {
        const filePath = c.file_url || c.file_path || '';
        const publicUrl = getPublicUrl(filePath);
        const hasFile = !!publicUrl;

        html += `
        <tr>
            <td>${formatDate(c.data_comanda)}</td>
            <td>${c.client ?? ""}</td>
            <td class="product-cell" ondblclick="open3DViewer('${publicUrl || ''}', '${(c.produs || '').replace(/'/g, "\\'")}')">
                ${c.produs ?? ""} ${hasFile ? '👁️ 3D' : ''}
            </td>
            <td>${c.cantitate ?? ""}</td>
            <td>
                <span class="status ${normalizeStatus(c.status)}" onclick="editStatus(${c.id},'${c.status}')" id="badge_${c.id}">
                    ${c.status ?? "Noua"}
                </span>
                <select id="status_${c.id}" style="display:none" onchange="changeStatus(${c.id})">
                    <option value="Noua">Noua</option>
                    <option value="InProgress">InProgress</option>
                    <option value="Done">Done</option>
                </select>
            </td>
            <td><input type="number" id="pret_${c.id}" value="${c.pret ?? ""}" style="width:90px"></td>
            <td><textarea id="coment_${c.id}" style="width:160px;height:45px">${c.coment ?? ""}</textarea></td>
            <td>
                ${hasFile ? `<button class="download-btn" onclick="window.open('${publicUrl}','_blank')">Descarcă</button>` : "-"}
            </td>
            <td><button class="save-btn" onclick="updateOrder('${c.id}')">💾</button></td>
        </tr>`;
    });
    html += "</table>";
    document.getElementById("lista").innerHTML = html;
}

/* Funcții auxiliare */
function formatDate(date){ if(!date) return "-"; return new Date(date).toLocaleString("ro-RO"); }
function normalizeStatus(status){ return status || "Noua"; }

function getPublicUrl(filePathOrUrl) {
    if (!filePathOrUrl) return null;
    let path = filePathOrUrl;
    if (filePathOrUrl.includes("/public/")) path = filePathOrUrl.split("/public/")[1];
    const { data } = supabaseClient.storage.from("comenzi").getPublicUrl(path);
    return data.publicUrl;
}

/* Funcțiile tale originale */
function editStatus(id, current){ /* codul original */ 
    const badge = document.getElementById("badge_"+id);
    const select = document.getElementById("status_"+id);
    badge.style.display = "none";
    select.style.display = "inline-block";
    select.value = current || "Noua";
    select.focus();
}

async function changeStatus(id){ /* codul original */ 
    const select = document.getElementById("status_"+id);
    const badge = document.getElementById("badge_"+id);
    let status = select.value;
    const { error } = await supabaseClient.from("comenzi").update({ status }).eq("id", Number(id));
    if(error) alert("Eroare update");
    else {
        badge.innerText = status;
        badge.className = "status " + normalizeStatus(status);
        select.style.display = "none";
        badge.style.display = "inline-block";
    }
}

function filterOrders(){ /* codul original */ 
    const search = document.getElementById("search").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;
    let filtered = allOrders.filter(o => {
        const matchSearch = (o.client && o.client.toLowerCase().includes(search)) ||
                            (o.produs && o.produs.toLowerCase().includes(search));
        const matchStatus = !status || o.status === status;
        return matchSearch && matchStatus;
    });
    renderOrders(filtered);
}

async function updateOrder(id){ /* codul original */ 
    const select = document.getElementById("status_"+id);
    const badge = document.getElementById("badge_"+id);
    let status = (select.style.display === "inline-block") ? select.value : badge.innerText;
    let pret = document.getElementById("pret_"+id).value || null;
    let coment = document.getElementById("coment_"+id).value || null;
    const { error } = await supabaseClient.from("comenzi").update({status, pret, coment}).eq("id", Number(id));
    if(error) alert("Eroare UPDATE");
    else {
        alert("✅ Salvat!");
        loadOrders();
    }
}

}

function close3DViewer() {
    const modal = document.getElementById("viewerModal");
    if (modal) modal.remove();
}
</script>
</body>
</html>
