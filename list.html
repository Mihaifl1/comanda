<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lista Comenzi</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Segoe UI,sans-serif;
background:#f1f3f7;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e3a8a;
color:white;
padding:15px 30px;
}

.logo{
font-weight:bold;
font-size:18px;
}

.back-btn{
background:white;
color:#1e3a8a;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.container{
padding:30px 60px;
}

.filter-bar{
margin-bottom:20px;
display:flex;
gap:15px;
}

input,select{
padding:8px 10px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

th{
background:#2c3e90;
color:white;
padding:14px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f8f9fc;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
color:white;
}

.status.Noua{background:#f39c12;}
.status.InProgress{background:#3498db;}
.status.Done{background:#2ecc71;}

.save-btn{
background:#27ae60;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.download-btn{
background:#3498db;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">📦 Sistem Comenzi</div>
<button class="back-btn" onclick="location.href='index.html'">⬅ Înapoi</button>
</div>

<div class="container">

<div class="filter-bar">
<input type="text" id="search" placeholder="Caută client / produs" onkeyup="filterOrders()">

<select id="statusFilter" onchange="filterOrders()">
<option value="">Toate</option>
<option value="Noua">Noua</option>
<option value="In Progress">In Progress</option>
<option value="Done">Done</option>
</select>
</div>

<div id="lista"></div>

</div>

<script>

const SUPABASE_URL="https://kbbdsywnixtfmxrtwcus.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiYmRzeXduaXh0Zm14cnR3Y3VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQ5MTksImV4cCI6MjA4ODEyMDkxOX0.Uz4xGhxiZkcwVIrNnFwoWpiwnLW2L8HCXGd4toNv3Hc";


const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let allOrders=[];

window.onload=()=>{
loadOrders();
};

async function loadOrders(){

const {data,error}=await supabaseClient
.from("comenzi")
.select("*")
.order("data_comanda",{ascending:false});

if(error){
console.error(error);
alert("Eroare la citirea comenzilor");
return;
}

allOrders=data;
renderOrders(data);

}

function formatDate(date){

if(!date) return "-";

return new Date(date).toLocaleString("ro-RO");

}

function normalizeStatus(status){

if(status==="In Progress") return "InProgress";

return status || "Noua";

}

function renderOrders(data){

let html=`
<table>
<tr>
<th>Data</th>
<th>Client</th>
<th>Produs</th>
<th>Cantitate</th>
<th>Status</th>
<th>Pret</th>
<th>Fisier</th>
<th>Salveaza</th>
</tr>
`;

data.forEach(c=>{

html+=`
<tr>

<td>${formatDate(c.data_comanda)}</td>

<td>${c.client}</td>

<td>${c.produs}</td>

<td>${c.cantitate}</td>

<td>
<span class="status ${normalizeStatus(c.status)}">${c.status}</span>
<br>
<select id="status_${c.id}">
<option value="Noua" ${c.status==="Noua"?"selected":""}>Noua</option>
<option value="In Progress" ${c.status==="In Progress"?"selected":""}>In Progress</option>
<option value="Done" ${c.status==="Done"?"selected":""}>Done</option>
</select>
</td>

<td>
<input type="number" id="pret_${c.id}" value="${c.pret ?? ""}" style="width:90px">
</td>

<td>
${c.file_url ? `<button class="download-btn" onclick="window.open('${c.file_url}','_blank')">Descarcă</button>` : "-"}
</td>

<td>
<button class="save-btn" onclick="updateOrder(${c.id})">💾</button>
</td>

</tr>
`;

});

html+="</table>";

document.getElementById("lista").innerHTML=html;

}

function filterOrders(){

const search=document.getElementById("search").value.toLowerCase();
const status=document.getElementById("statusFilter").value;

let filtered=allOrders.filter(o=>{

const matchSearch=
(o.client && o.client.toLowerCase().includes(search)) ||
(o.produs && o.produs.toLowerCase().includes(search));

const matchStatus=
!status || o.status===status;

return matchSearch && matchStatus;

});

renderOrders(filtered);

}

async function updateOrder(id){

const status=document.getElementById("status_"+id).value;
let pret=document.getElementById("pret_"+id).value;

if(pret==="") pret=null;

const {data,error}=await supabaseClient
.from("comenzi")
.update({
status:status,
pret:pret
})
.eq("id",id)
.select();

if(error){

console.error(error);
alert("Update DB eșuat");

}else{

console.log("Update OK:",data);
alert("Salvat!");
loadOrders();

}

}

</script>

</body>
</html>
